name: Task 3

on:
  pull_request:
    branches: ["develop"]

permissions:
  contents: write

jobs:
  tests-and-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Cloning repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[test]

      - name: Test with pytest
        run: |
          python -m pytest --cov=myapp \
          --cov-fail-under=70 \
          --junit-xml=reports/junit.xml \
          --cov-report=xml:reports/results.xml \
          --cov-report=markdown:reports/results.md \
          --cov-report=html:reports/htmlcov/ \
          tests/

      - name: Upload pytest test results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results
          path: reports/
        if: always()

  build:
    needs: tests-and-coverage

    runs-on: ubuntu-latest

    steps:
      - name: Cloning repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: 'pip'

      - name: Install dependencies and build tool
        run: |
          python -m pip install --upgrade pip
          pip install . build

      - name: Build Python Package
        run: python -m build

      - name: Upload Build Artefacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/

      - name: Update README with Badge
        run: |
          BADGE="[![Build Status](https://github.com/${{ github.repository }}/actions/workflows/task3.yaml/badge.svg)](https://github.com/${{ github.repository }}/actions)"

          sed -i "s|<!-- BADGE -->|$BADGE|" README.md

          if [[ -n $(git status -s README.md) ]]; then
            echo "Changes detected in README.md. Committing..."

            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"

            git add README.md
            git commit -m "change build status badge [skip ci]"

            git push origin HEAD:${{ github.head_ref }}
          else
            echo "No changes in README.md. Skipping"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
