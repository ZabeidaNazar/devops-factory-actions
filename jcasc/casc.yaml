jenkins:
  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: ${JENKINS_ADMIN_ID}
          password: ${JENKINS_ADMIN_PASSWORD}
  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

unclassified:
  location:
    url: http://${JENKINS_URL}/

tool:
  terraform:
    installations:
      - name: "terraform-1.15.8"
        properties:
          - installSource:
              installers:
                - terraformInstaller:
                    id: "1.15.8-linux-amd64"